<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Visitas Técnicas - Fortaleza</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #f8fafc; --primary: #1a1c2c; --accent: #3b82f6;
            --border-std: #94a3b8; --white: #ffffff; --holiday: #059669; --weekend: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: #1e293b; line-height: 1.5; }

        .top-nav { background: var(--white); border-bottom: 1px solid #e2e8f0; padding: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .nav-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .nav-btn { padding: 0.6rem 1rem; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; background: transparent; color: #64748b; border: 1px solid transparent; transition: 0.2s; white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: white; }

        .action-bar { padding: 10px 20px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .action-group { display: flex; gap: 5px; flex-wrap: wrap; }

        .main-content { padding: 15px; max-width: 1600px; margin: 0 auto; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        
        @media (max-width: 768px) {
            .calendar-grid { gap: 4px; }
            .calendar-cell { height: 110px !important; padding: 4px !important; border-radius: 8px !important; }
            .day-number { font-size: 0.9rem !important; }
            .t-name { font-size: 0.55rem !important; }
            .u-name, .c-name { font-size: 0.5rem !important; }
            .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; width: 100%; }
            .action-bar { justify-content: center; }
            .action-group { justify-content: center; width: 100%; }
        }

        .calendar-cell {
            background: var(--white); border: 2px solid var(--border-std); border-radius: 12px;
            height: 150px; padding: 10px; display: flex; flex-direction: column; align-items: center;
            overflow: hidden; cursor: pointer; position: relative;
        }
        .cell-weekend { border-color: var(--weekend); }
        .cell-holiday { border-color: var(--holiday); }
        .day-number { font-weight: 800; font-size: 1.2rem; color: #4338ca; }
        .holiday-label { color: var(--holiday); font-size: 0.6rem; font-weight: 800; text-align: center; text-transform: uppercase; }

        .info-card { border-top: 1px solid #f1f5f9; width: 100%; padding: 4px 0; margin-top: 2px; text-align: center; }
        .t-name { font-size: 0.7rem; font-weight: 800; color: #1e293b; display: block; text-transform: uppercase; }
        .u-name { font-size: 0.65rem; font-weight: 700; color: var(--accent); display: block; }
        .c-name { font-size: 0.65rem; color: #64748b; display: block; }

        .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        .form-input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; }
    </style>
</head>
<body>

    <nav class="top-nav no-print">
        <h1 style="font-size: 1.1rem; font-weight: 800;">VISITAS TÉCNICAS</h1>
        <div class="nav-buttons">
            <button class="nav-btn active" id="btn-calendario" onclick="switchTab('calendario')">Calendário</button>
            <button class="nav-btn admin-only" id="btn-agendamentos" style="display:none;" onclick="switchTab('agendamentos')">Agendar</button>
            <button class="nav-btn" id="btn-tecnicos" onclick="switchTab('tecnicos')">Técnicos</button>
            <button class="nav-btn" id="btn-urs" onclick="switchTab('urs')">URs</button>
            <button class="nav-btn" style="color: #ef4444;" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="action-bar no-print">
        <div class="action-group">
            <button class="nav-btn" style="border:1px solid #ddd" onclick="prevMonth()">Anterior</button>
            <button class="nav-btn" style="border:1px solid #ddd" onclick="nextMonth()">Próximo</button>
        </div>
        <div class="action-group">
            <button class="nav-btn admin-only" style="background:#6366f1; color:white; display:none;" id="btnPrint" onclick="window.print()">🖨️ Imprimir</button>
            <button class="nav-btn admin-only" style="background: #10b981; color: white; display:none;" id="btnPass" onclick="changePasswordModal()">🔑 Senhas</button>
            <button class="nav-btn admin-only" style="background: #8b5cf6; color: white; display:none;" id="btnUser" onclick="createUserModal()">👤 Criar Usuário</button>
            <button class="nav-btn admin-only" style="border:1px solid #ddd; display:none;" id="btnBackup" onclick="exportJSON()">💾 Backup</button>
        </div>
    </div>

    <main class="main-content">
        <div id="calendario" class="content-section active">
            <h2 id="calendarTitle" style="text-align:center; margin-bottom:15px; text-transform:uppercase; font-weight: 800; color: var(--primary);"></h2>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div id="agendamentos" class="content-section">
            <div class="card admin-only" style="display:none;">
                <h3>Novo Agendamento</h3><br>
                <form onsubmit="addAgendamento(event)">
                    <select id="tecnicoSelect" class="form-input" required></select>
                    <select id="urSelect" class="form-input" required onchange="updateCidades()"></select>
                    <select id="cidadeSelect" class="form-input" required></select>
                    <input type="date" id="dataInput" class="form-input" required>
                    <textarea id="atividadesInput" class="form-input" style="height:100px" placeholder="Roteiro Técnico" required></textarea>
                    <button type="submit" class="nav-btn" style="background:var(--accent); color:white; width:100%; padding: 12px;">Salvar no Banco</button>
                </form>
            </div>
        </div>
        </main>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 id="modalTitle" style="margin-bottom:15px; font-weight: 800;">Detalhes</h2>
            <div id="modalBody"></div><br>
            <button class="nav-btn" style="width:100%; background:#f1f5f9; color: var(--primary);" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQK1QbzDjQL_CwG3S7d1ClVykNcekmVn8",
            authDomain: "escala-vistas.firebaseapp.com",
            databaseURL: "https://escala-vistas-default-rtdb.firebaseio.com/",
            projectId: "escala-vistas",
            storageBucket: "escala-vistas.firebasestorage.app",
            messagingSenderId: "660320279802",
            appId: "1:660320279802:web:7160ef09c273770fd6bd4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localData = { technicians: [], urs: [], agendamentos: [] };
        const FERIADOS = { '01-01': 'Ano Novo', '19-03': 'São José', '25-03': 'Data Magna CE', '13-04': 'Aniv. Fortaleza', '01-05': 'Trabalho', '25-12': 'Natal' };
        let user = null;
        let currentDate = new Date();

        function login() {
            db.ref('config/users').once('value', (snap) => {
                const usersFromDb = snap.val() || { "admin": { senha: "123", nivel: "total" }, "tecnico": { senha: "456", nivel: "leitura" } };
                const u = prompt("Usuário:"); const s = prompt("Senha:");
                
                if (usersFromDb[u] && (usersFromDb[u].senha === s || usersFromDb[u] === s)) {
                    const nivel = (usersFromDb[u].nivel || (u === 'admin' ? 'total' : 'leitura'));
                    user = { id: u, nivel: nivel };
                    
                    if (user.nivel === "total") {
                        document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
                        document.getElementById('btnPrint').style.display = 'block';
                        document.getElementById('btnPass').style.display = 'block';
                        document.getElementById('btnUser').style.display = 'block';
                        document.getElementById('btnBackup').style.display = 'block';
                    }
                    startSync();
                } else { alert("Acesso negado"); location.reload(); }
            });
        }

        function logout() { if(confirm("Deseja sair do sistema?")) location.reload(); }

        function createUserModal() {
            if (user.nivel !== 'total') return;
            const nome = prompt("Novo Nome de Usuário:");
            if(!nome) return;
            const senha = prompt("Defina a Senha:");
            if(!senha) return;
            const nivel = confirm("Este usuário será ADMINISTRADOR?\nOK = Sim / Cancelar = Técnico (Apenas Leitura)") ? "total" : "leitura";
            
            db.ref('config/users/' + nome).set({ senha: senha, nivel: nivel }).then(() => alert("Usuário criado!"));
        }

        function changePasswordModal() {
            if (user.nivel !== 'total') return;
            const alvo = prompt("Alterar senha de qual usuário?");
            if (alvo) {
                const nova = prompt("Nova senha para " + alvo + ":");
                if(nova) {
                    db.ref('config/users/' + alvo).once('value', (s) => {
                        const dados = s.val();
                        const nivelAtual = (typeof dados === 'object') ? dados.nivel : (alvo === 'admin' ? 'total' : 'leitura');
                        db.ref('config/users/' + alvo).set({ senha: nova, nivel: nivelAtual }).then(() => alert("Senha alterada!"));
                    });
                }
            }
        }

        function startSync() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                localData.technicians = Object.values(data.technicians || {});
                localData.urs = Object.values(data.urs || {});
                localData.agendamentos = Object.values(data.agendamentos || {});
                renderCalendar();
                // updateSelects, tables etc aqui...
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
            document.getElementById('calendarTitle').textContent = currentDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
            grid.innerHTML = '';
            ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'].forEach(d => grid.innerHTML += `<div style="text-align:center; font-size:0.7rem; font-weight:800; color:#64748b; padding-bottom:5px;">${d}</div>`);
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="calendar-cell" style="visibility: hidden;"></div>';
            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(year, month, day), dm = `${String(day).padStart(2,'0')}-${String(month+1).padStart(2,'0')}`, ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const fn = FERIADOS[dm], iw = d.getDay() === 0 || d.getDay() === 6, da = localData.agendamentos.filter(a => a.data === ds);
                let cl = "calendar-cell" + (iw ? " cell-weekend" : "") + (fn ? " cell-holiday" : "");
                let h = `<div class="${cl}" onclick="quickSchedule('${ds}')"><span class="day-number">${day}</span>${fn ? `<div class="holiday-label">${fn}</div>` : ''}`;
                da.forEach(a => {
                    const t = localData.technicians.find(x => x.id === a.tecnicoId), u = localData.urs.find(x => x.id === a.urId), c = u?.cidades.find(x => x.id === a.cidadeId);
                    h += `<div class="info-card" onclick="event.stopPropagation(); openDetail('${a.id}')"><span class="t-name">${t?.nome || '---'}</span><span class="u-name">${u?.nome || '---'}</span><span class="c-name">${c?.nome || '---'}</span></div>`;
                });
                grid.innerHTML += h + `</div>`;
            }
        }

        function quickSchedule(d) { if(user.nivel === 'total') { switchTab('agendamentos'); document.getElementById('dataInput').value = d; } }
        function switchTab(id) { document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
        function exportJSON() { const d = { techs: localData.technicians, urs: localData.urs, ags: localData.agendamentos }, b = new Blob([JSON.stringify(d)], {type:'application/json'}), a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'backup_escala.json'; a.click(); }
        
        window.onload = login;
    </script>
</body>
</html>
