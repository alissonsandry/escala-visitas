<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Visitas Técnicas - Fortaleza</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-body: #f8fafc; --primary: #1a1c2c; --accent: #3b82f6;
            --border-std: #94a3b8; --white: #ffffff; --holiday: #059669; --weekend: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: #1e293b; line-height: 1.5; }

        /* --- TELA DE LOGIN --- */
        #loginScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

        /* --- LAYOUT PRINCIPAL --- */
        #appContent { display: none; }
        .top-nav { background: var(--white); border-bottom: 1px solid #e2e8f0; padding: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .nav-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .nav-btn { padding: 0.6rem 1rem; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; background: transparent; color: #64748b; border: 1px solid transparent; transition: 0.2s; white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: white; }

        .action-bar { padding: 10px 20px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .action-group { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

        .main-content { padding: 15px; max-width: 1600px; margin: 0 auto; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        
        @media (max-width: 768px) {
            .calendar-grid { gap: 4px; }
            .calendar-cell { height: 115px !important; padding: 4px !important; border-radius: 8px !important; }
            .day-number { font-size: 0.9rem !important; }
            .t-name { font-size: 0.55rem !important; }
            .u-name, .c-name { font-size: 0.5rem !important; }
            .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; width: 100%; }
            .action-bar { justify-content: center; padding: 10px; }
            .action-group { justify-content: center; width: 100%; }
            .top-nav h1 { width: 100%; text-align: center; margin-bottom: 5px; }
        }

        .calendar-cell { background: var(--white); border: 2px solid var(--border-std); border-radius: 12px; height: 150px; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow: hidden; cursor: pointer; position: relative; }
        .cell-weekend { border-color: var(--weekend); }
        .cell-holiday { border-color: var(--holiday); }
        .day-number { font-weight: 800; font-size: 1.2rem; color: #4338ca; pointer-events: none; }
        .holiday-label { color: var(--holiday); font-size: 0.6rem; font-weight: 800; text-align: center; text-transform: uppercase; pointer-events: none; }

        .info-card { border-top: 1px solid #f1f5f9; width: 100%; padding: 4px 0; margin-top: 2px; text-align: center; z-index: 10; }
        .t-name { font-size: 0.7rem; font-weight: 800; color: #1e293b; display: block; text-transform: uppercase; pointer-events: none; }
        .u-name { font-size: 0.65rem; font-weight: 700; color: var(--accent); display: block; pointer-events: none; }
        .c-name { font-size: 0.65rem; color: #64748b; display: block; pointer-events: none; }

        .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        .form-input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 6000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; }

        @media print {
            .no-print, #loginScreen, .top-nav, .action-bar, .modal-overlay, button, input, select, textarea { display: none !important; }
            body, html { background: white !important; height: auto !important; overflow: visible !important; }
            #appContent { display: block !important; padding: 0 !important; }
            .main-content { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
            .calendar-grid { display: grid !important; grid-template-columns: repeat(7, 1fr) !important; gap: 5px !important; width: 100% !important; }
            .calendar-cell { border-width: 1.5px !important; height: 120px !important; page-break-inside: avoid !important; border-color: #94a3b8 !important; }
            .day-number { color: black !important; }
            .calendar-cell.cell-weekend { border-color: #ef4444 !important; }
            .calendar-cell.cell-holiday { border-color: #059669 !important; }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="no-print">
        <div class="login-card">
            <h2 style="margin-bottom: 20px; font-weight: 800;">Acesso ao Sistema</h2>
            <input type="text" id="userInput" class="form-input" placeholder="Usuário">
            <input type="password" id="passInput" class="form-input" placeholder="Senha">
            <button class="nav-btn" style="background: var(--primary); color: white; width: 100%; padding: 12px;" onclick="validateLogin()">Entrar</button>
        </div>
    </div>

    <div id="appContent">
        <nav class="top-nav no-print">
            <h1 style="font-size: 1.1rem; font-weight: 800;">VISITAS TÉCNICAS</h1>
            <div class="nav-buttons">
                <button class="nav-btn active" id="btn-calendario" onclick="switchTab('calendario')">Calendário</button>
                <button class="nav-btn admin-only" id="btn-agendamentos" style="display:none;" onclick="switchTab('agendamentos')">Agendar</button>
                <button class="nav-btn" id="btn-tecnicos" onclick="switchTab('tecnicos')">Técnicos</button>
                <button class="nav-btn" id="btn-urs" onclick="switchTab('urs')">URs</button>
                <button class="nav-btn" style="color: #ef4444;" onclick="logout()">Sair</button>
            </div>
        </nav>

        <div class="action-bar no-print">
            <div class="action-group">
                <button class="nav-btn" style="border:1px solid #ddd" onclick="prevMonth()">Anterior</button>
                <button class="nav-btn" style="border:1px solid #ddd" onclick="nextMonth()">Próximo</button>
                
                <button class="nav-btn" style="background:#0ea5e9; color:white; display:none; margin-left: 10px;" id="btnViewFeriados" onclick="abrirFeriados()">📅 Ver Feriados</button>
                <button class="nav-btn admin-only" style="background:#f59e0b; color:white; display:none;" id="btnUploadFeriados" onclick="document.getElementById('pdfUploadInput').click()">📤 Atualizar PDF</button>
                <button class="nav-btn admin-only" style="background:#ef4444; color:white; display:none;" id="btnRemoveFeriados" onclick="removerFeriados()">🗑️ Remover PDF</button>
                <input type="file" id="pdfUploadInput" accept="application/pdf" style="display:none" onchange="uploadFeriados(event)">
            </div>
   
            <div class="action-group">
                <button class="nav-btn admin-only" style="background:#6366f1; color:white; display:none;" id="btnPrint" onclick="window.print()">🖨️ Imprimir</button>
                <button class="nav-btn admin-only" style="background: #10b981; color: white; display:none;" id="btnPass" onclick="changePasswordModal()">🔑 Senhas</button>
                <button class="nav-btn admin-only" style="background: #8b5cf6; color: white; display:none;" id="btnUser" onclick="createUserModal()">👤 Criar Usuário</button>
            </div>
        </div>

        <main class="main-content">
            <div id="calendario" class="content-section active">
                <h2 id="calendarTitle" style="text-align:center; margin-bottom:15px; text-transform:uppercase; font-weight: 800; color: var(--primary);"></h2>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div id="agendamentos" class="content-section">
                <div class="card admin-only">
                    <h3>Novo Agendamento</h3><br>
                    <form onsubmit="addAgendamento(event)">
                        <select id="tecnicoSelect" class="form-input" required></select>
                        <select id="urSelect" class="form-input" required onchange="updateCidades()"></select>
                        <select id="cidadeSelect" class="form-input" required></select>
                        <input type="date" id="dataInput" class="form-input" required>
                        <textarea id="atividadesInput" class="form-input" style="height:100px" placeholder="Roteiro Técnico" required></textarea>
                        <button type="submit" class="nav-btn" style="background:var(--accent); color:white; width:100%; padding: 12px;">Salvar no Banco Online</button>
                    </form>
                </div>
            </div>

            <div id="tecnicos" class="content-section">
                <div class="card admin-only">
                    <h3>Técnicos</h3><br>
                    <form onsubmit="addTecnico(event)" style="display:flex; gap:10px">
                        <input type="text" id="tecnicoNomeInput" class="form-input" placeholder="Nome" required>
                        <button type="submit" class="nav-btn" style="background:var(--primary); color:white">Adicionar</button>
                    </form>
                </div>
                <div class="card"><table style="width:100%" id="tecnicosTable"></table></div>
            </div>

            <div id="urs" class="content-section">
                <div class="card admin-only">
                    <h3>URs</h3><br>
                    <form onsubmit="addUR(event)">
                        <input type="text" id="urNomeInput" class="form-input" placeholder="Nome UR (Ex: 9ª UR)" required>
                        <div id="cidadesInputContainer" style="margin-bottom: 10px;">
                            <input type="text" class="form-input cidade-input" placeholder="Nome da Cidade">
                        </div>
                        <button type="button" class="nav-btn" style="border:1px solid #ddd; width: 100%;" onclick="addCidadeInput()">+ Adicionar outra cidade nesta UR</button>
                        <button type="submit" class="nav-btn" style="background:var(--primary); color:white; width:100%; margin-top:10px;">Salvar UR</button>
                    </form>
                </div>
                <div id="ursTable"></div>
            </div>
        </main>
    </div>

    <div id="modalOverlay" class="modal-overlay no-print" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 id="modalTitle" style="margin-bottom:15px; font-weight: 800;">Detalhes</h2>
            <div id="modalBody"></div><br>
            <button class="nav-btn" style="width:100%; background:#f1f5f9; color: var(--primary);" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pmagwhajmfdvfplkicjq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LqAjXMp9oYUEIYWIlGkSuA_Y6_ysfmJ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let localData = { technicians: [], urs: [], agendamentos: [], feriadosPdf: null };
        
        const FERIADOS = { 
            '01-01': 'Ano Novo', '16-02': 'Carnaval', '17-02': 'Carnaval', '18-02': 'Cinzas', '19-03': 'São José', 
            '25-03': 'Data Magna CE', '02-04': 'Quinta-feira Santa', '03-04': 'Sexta-feira Santa', '13-04': 'Aniv. Fortaleza', 
            '21-04': 'Tiradentes', '01-05': 'Dia do Trabalho', '04-06': 'Corpus Christi', '07-09': 'Independência',
            '12-10': 'N. Sra. Aparecida', '28-10': 'Dia do Servidor', '02-11': 'Finados', '20-11': 'Consciência Negra',
            '08-12': 'Dia da Justiça', '25-12': 'Natal' 
        };

        let userLevel = null;
        let currentDate = new Date();

        function generateUUID() {
            return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        async function validateLogin() {
            try {
                const rawUser = document.getElementById('userInput').value.trim().toLowerCase();
                const rawPass = document.getElementById('passInput').value.trim();

                if (!rawUser || !rawPass) {
                    alert("Por favor, preencha o usuário e a senha.");
                    return;
                }

                const { data: users, error } = await _supabase.from('users').select('*').eq('username', rawUser);

                if (error) throw error;

                if (users && users.length > 0) {
                    const userData = users[0];
                    if (userData.senha === rawPass) {
                        userLevel = userData.nivel || 'leitura';
                        
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('appContent').style.display = 'block';
                        
                        if (userLevel === "total") {
                            document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
                            document.getElementById('btnPrint').style.display = 'block';
                            document.getElementById('btnPass').style.display = 'block';
                            document.getElementById('btnUser').style.display = 'block';
                            document.getElementById('btnUploadFeriados').style.display = 'inline-block';
                        } else {
                            document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'none');
                        }
                        await fetchSync();
                    } else {
                        alert("Senha incorreta.");
                    }
                } else { 
                    alert("Usuário não encontrado."); 
                }
            } catch (err) {
                alert("Erro ao logar: " + err.message);
            }
        }

        function logout() { location.reload(); }

        async function fetchSync() {
            try {
                const [techsRes, ursRes, agendamentosRes, configRes] = await Promise.all([
                    _supabase.from('technicians').select('*'),
                    _supabase.from('urs').select('*'),
                    _supabase.from('agendamentos').select('*'),
                    _supabase.from('config').select('*').eq('key', 'feriadosPdfUrl')
                ]);

                // ORDENAÇÃO DE TÉCNICOS (Alfabética)
                let techs = techsRes.data || [];
                techs.sort((a, b) => a.nome.localeCompare(b.nome));
                localData.technicians = techs;

                // ORDENAÇÃO DAS URs E CIDADES
                let urs = ursRes.data || [];
                urs = urs.map(ur => {
                    if (ur.cidades && Array.isArray(ur.cidades)) {
                        // Ordena as cidades de cada UR alfabeticamente
                        ur.cidades.sort((a, b) => a.localeCompare(b));
                    }
                    return ur;
                });
                
                // Ordena as URs por número crescente (ex: 1ª UR, 2ª UR, 10ª UR)
                urs.sort((a, b) => {
                    const numA = parseInt(a.nome.match(/\d+/)?.[0] || 0);
                    const numB = parseInt(b.nome.match(/\d+/)?.[0] || 0);
                    if (numA !== numB) return numA - numB;
                    return a.nome.localeCompare(b.nome);
                });
                localData.urs = urs;

                localData.agendamentos = agendamentosRes.data || [];
                
                if (configRes.data && configRes.data.length > 0) {
                    localData.feriadosPdf = configRes.data[0].value;
                    document.getElementById('btnViewFeriados').style.display = 'inline-block';
                    if(userLevel === 'total') document.getElementById('btnRemoveFeriados').style.display = 'inline-block';
                } else {
                    localData.feriadosPdf = null;
                    document.getElementById('btnViewFeriados').style.display = 'none';
                    document.getElementById('btnRemoveFeriados').style.display = 'none';
                }

                renderCalendar(); 
                renderTecnicosTable(); 
                renderURsTable(); 
                updateSelects();
            } catch (error) {
                console.error("Erro ao sincronizar dados:", error);
            }
        }

        async function uploadFeriados(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.type !== "application/pdf") {
                alert("Por favor, selecione apenas arquivos em formato PDF.");
                document.getElementById('pdfUploadInput').value = '';
                return;
            }

            const btn = document.getElementById('btnUploadFeriados');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Enviando PDF...";
            btn.disabled = true;

            try {
                const { data, error } = await _supabase.storage.from('feriados').upload('calendario_feriados.pdf', file, {
                    cacheControl: '3600',
                    upsert: true 
                });

                if (error) throw error;

                const { data: urlData } = _supabase.storage.from('feriados').getPublicUrl('calendario_feriados.pdf');
                
                const { error: dbError } = await _supabase.from('config').upsert({ key: 'feriadosPdfUrl', value: urlData.publicUrl });
                if (dbError) throw dbError;

                alert("O Calendário de Feriados foi atualizado com sucesso!");
                await fetchSync();

            } catch (error) {
                alert("Erro ao enviar o arquivo. Verifique se o bucket 'feriados' existe e é Público no Supabase.\nDetalhes: " + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                document.getElementById('pdfUploadInput').value = ''; 
            }
        }

        async function removerFeriados() {
            if(!confirm("Tem certeza que deseja remover o calendário de feriados? O botão 'Ver Feriados' vai sumir para todos até você enviar um novo.")) return;

            try {
                await _supabase.from('config').delete().eq('key', 'feriadosPdfUrl');
                await _supabase.storage.from('feriados').remove(['calendario_feriados.pdf']);
                
                alert("PDF removido com sucesso!");
                await fetchSync(); 
            } catch (error) {
                alert("Erro ao remover o PDF: " + error.message);
            }
        }

        function abrirFeriados() {
            if (localData.feriadosPdf) {
                window.open(localData.feriadosPdf, '_blank');
            } else {
                alert("Nenhum calendário em PDF foi disponibilizado.");
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
            document.getElementById('calendarTitle').textContent = currentDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
            grid.innerHTML = '';
            ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'].forEach(d => grid.innerHTML += `<div class="day-label-header" style="text-align:center; font-size:0.7rem; font-weight:800; color:#64748b; padding-bottom:5px;">${d}</div>`);
            
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="calendar-cell no-print" style="visibility: hidden;"></div>';
            
            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(year, month, day);
                const dm = `${String(day).padStart(2,'0')}-${String(month+1).padStart(2,'0')}`;
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const fn = FERIADOS[dm];
                const iw = d.getDay() === 0 || d.getDay() === 6;
                const da = localData.agendamentos.filter(a => a.data === ds);
                
                let cl = "calendar-cell" + (iw ? " cell-weekend" : "") + (fn ? " cell-holiday" : "");
                let h = `<div class="${cl}" onclick="quickSchedule('${ds}')"><span class="day-number">${day}</span>${fn ? `<div class="holiday-label">${fn}</div>` : ''}`;
                
                da.forEach(a => {
                    const tecnicoRef = a.tecnico_id || a.tecnicoId;
                    const urRef = a.ur_id || a.urId;
                    const cidadeRef = a.cidade_id || a.cidadeId;

                    const t = localData.technicians.find(x => String(x.id) === String(tecnicoRef));
                    const u = localData.urs.find(x => String(x.id) === String(urRef));
                    
                    h += `<div class="info-card" onclick="event.stopPropagation(); openDetail('${a.id}')"><span class="t-name">${t?.nome || '---'}</span><span class="u-name">${u?.nome || '---'}</span><span class="c-name">${cidadeRef || '---'}</span></div>`;
                });
                grid.innerHTML += h + `</div>`;
            }
        }

        function quickSchedule(d) { 
            if(userLevel === 'total') { switchTab('agendamentos'); document.getElementById('dataInput').value = d; } 
        }

        function openDetail(id) {
            const a = localData.agendamentos.find(x => String(x.id) === String(id));
            
            const tecnicoRef = a.tecnico_id || a.tecnicoId;
            const urRef = a.ur_id || a.urId;
            const cidadeRef = a.cidade_id || a.cidadeId;

            const t = localData.technicians.find(x => String(x.id) === String(tecnicoRef));
            const u = localData.urs.find(x => String(x.id) === String(urRef));
            
            document.getElementById('modalTitle').innerText = "Detalhes da Visita";
            document.getElementById('modalBody').innerHTML = `<p><strong>Técnico:</strong> ${t?.nome}</p><p><strong>Local:</strong> ${u?.nome} - ${cidadeRef}</p><p><strong>Data:</strong> ${a.data}</p><br><div style="background:#f1f5f9; padding:15px; border-radius:8px; font-size:13px; white-space:pre-wrap;">${a.atividades}</div>`;
            if(userLevel === 'total') document.getElementById('modalBody').innerHTML += `<br><button class="nav-btn no-print" style="color:red; border:1px solid red; width:100%" onclick="deleteItem('agendamentos','${id}')">Excluir Registro</button>`;
            document.getElementById('modalOverlay').classList.add('active');
        }

        async function deleteItem(tabela, id) { 
            if(confirm('Excluir permanentemente?')) { 
                await _supabase.from(tabela).delete().eq('id', id);
                closeModal(); 
                fetchSync();
            } 
        }

        async function removeCidadeFromUR(urId, nomeCidade) {
            if(!confirm(`Deseja remover ${nomeCidade} desta UR?`)) return;
            
            const ur = localData.urs.find(u => String(u.id) === String(urId));
            if(!ur || !ur.cidades) return;
            
            const novasCidades = ur.cidades.filter(c => c !== nomeCidade);
            
            await _supabase.from('urs').update({ cidades: novasCidades }).eq('id', ur.id);
            fetchSync();
        }

        async function addTecnico(e) { 
            e.preventDefault(); 
            const id = generateUUID(); 
            const nome = document.getElementById('tecnicoNomeInput').value.trim();
            await _supabase.from('technicians').insert([{ id, nome }]);
            document.getElementById('tecnicoNomeInput').value = '';
            fetchSync();
        }

        async function addUR(e) { 
            e.preventDefault(); 
            
            const nomeUR = document.getElementById('urNomeInput').value.trim();
            const cidadesInputs = Array.from(document.querySelectorAll('.cidade-input'));
            
            if (!nomeUR) return alert("Por favor, digite o nome da UR.");

            const novasCidades = cidadesInputs.filter(i => i.value.trim() !== '').map(i => i.value.trim().toUpperCase()); 

            if (novasCidades.length === 0) return alert("Por favor, adicione pelo menos uma cidade para esta UR.");

            const { data: urExistente } = await _supabase.from('urs').select('*').ilike('nome', nomeUR);

            if (urExistente && urExistente.length > 0) {
                const urId = urExistente[0].id;
                const cidadesAtuais = urExistente[0].cidades || [];
                
                const cidadesAtualizadas = [...new Set([...cidadesAtuais, ...novasCidades])];

                await _supabase.from('urs').update({ cidades: cidadesAtualizadas }).eq('id', urId);
            } else {
                const id = generateUUID();
                await _supabase.from('urs').insert([{ id, nome: nomeUR.toUpperCase(), cidades: novasCidades }]);
            }
            
            document.getElementById('urNomeInput').value = ''; 
            document.getElementById('cidadesInputContainer').innerHTML = '<input type="text" class="form-input cidade-input" placeholder="Nome da Cidade">';
            fetchSync();
        }

        async function addAgendamento(e) { 
            e.preventDefault(); 
            const id = generateUUID(); 
            
            const payload = { 
                id: id, 
                tecnico_id: document.getElementById('tecnicoSelect').value, 
                ur_id: document.getElementById('urSelect').value, 
                cidade_id: document.getElementById('cidadeSelect').value, 
                data: document.getElementById('dataInput').value, 
                atividades: document.getElementById('atividadesInput').value 
            };
            
            try {
                const { error } = await _supabase.from('agendamentos').insert([payload]);
                if (error) throw error;
                switchTab('calendario');
                fetchSync();
            } catch (err) {
                alert("Erro ao salvar o agendamento no banco de dados: " + err.message);
                console.error(err);
            }
        }
        
        async function changePasswordModal() {
            const alvo = prompt("Alterar senha de qual usuário? (admin ou tecnico)");
            if (alvo) {
                const nova = prompt("Nova senha:");
                if(nova) {
                    await _supabase.from('users').update({ senha: nova }).eq('username', alvo);
                    alert("Senha alterada!");
                }
            }
        }

        async function createUserModal() {
            const nome = prompt("Nome do novo usuário:");
            const senha = prompt("Senha:");
            const niv = confirm("Será administrador?") ? "total" : "leitura";
            if(nome && senha) {
                await _supabase.from('users').insert([{ username: nome.trim().toLowerCase(), senha: senha.trim(), nivel: niv }]);
                alert("Usuário criado!");
            }
        }

        function renderTecnicosTable() {
            document.getElementById('tecnicosTable').innerHTML = localData.technicians.map(t => `<tr style="border-bottom:1px solid #eee"><td style="padding:12px; font-weight:600">${t.nome}</td><td align="right" class="no-print">${userLevel === 'total' ? `<button class="nav-btn" style="color:red" onclick="deleteItem('technicians','${t.id}')">Excluir</button>` : ''}</td></tr>`).join('');
        }

        function renderURsTable() {
            document.getElementById('ursTable').innerHTML = localData.urs.map(u => {
                let htmlCidades = '';
                if(u.cidades && Array.isArray(u.cidades)) {
                    htmlCidades = u.cidades.map(cNome => {
                        const btnRemove = userLevel === 'total' ? `<span onclick="removeCidadeFromUR('${u.id}', '${cNome}')" style="color: #ef4444; font-weight: bold; cursor: pointer; margin-left: 6px; padding: 0 4px;" title="Remover cidade">&times;</span>` : '';
                        return `<span style="display: inline-block; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 8px; margin: 4px 4px 0 0; font-size: 0.75rem; color: #475569;">${cNome}${btnRemove}</span>`;
                    }).join('');
                }
                
                return `
                <div class="card" style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <strong style="color: var(--primary); font-size: 1.1rem;">${u.nome}</strong>
                        <div style="margin-top: 8px;">
                            ${htmlCidades || '<span style="color: #ef4444; font-size: 0.8rem;">Nenhuma cidade cadastrada</span>'}
                        </div>
                    </div>
                    <div class="no-print" style="margin-left: 10px; margin-top: 5px;">
                        ${userLevel === 'total' ? `<button class="nav-btn" style="color:red; border: 1px solid #ffcdd2;" onclick="deleteItem('urs','${u.id}')">Excluir UR Completa</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function updateSelects() {
            const tecSelect = document.getElementById('tecnicoSelect');
            const urSelect = document.getElementById('urSelect');
            const cidSelect = document.getElementById('cidadeSelect');

            const currentTec = tecSelect.value;
            const currentUr = urSelect.value;
            const currentCidade = cidSelect.value;

            tecSelect.innerHTML = '<option value="" disabled selected>Selecione o Técnico</option>' + 
                localData.technicians.map(t => `<option value="${t.id}">${t.nome}</option>`).join('');
                
            urSelect.innerHTML = '<option value="" disabled selected>Selecione a UR</option>' + 
                localData.urs.map(u => `<option value="${u.id}">${u.nome}</option>`).join('');

            if (currentTec) tecSelect.value = currentTec;
            if (currentUr) urSelect.value = currentUr;

            updateCidades();
            
            if (currentCidade) {
                const exists = Array.from(cidSelect.options).some(opt => opt.value === currentCidade);
                if (exists) {
                    cidSelect.value = currentCidade;
                }
            }
        }

        function updateCidades() {
            const urId = document.getElementById('urSelect').value;
            const ur = localData.urs.find(u => String(u.id) === String(urId) || u.nome === urId);
            
            let html = '<option value="" disabled selected>Selecione a Cidade</option>';
            
            if (ur && ur.cidades && Array.isArray(ur.cidades) && ur.cidades.length > 0) {
                html += ur.cidades.map(cNome => `<option value="${cNome}">${cNome}</option>`).join('');
            } else if (urId) {
                html = '<option value="" disabled selected>Nenhuma cidade cadastrada nesta UR</option>';
            }
            
            document.getElementById('cidadeSelect').innerHTML = html;
        }

        function addCidadeInput() { 
            const inp = document.createElement('input');
            inp.className = 'form-input cidade-input'; 
            inp.placeholder = 'Nome da Cidade'; 
            document.getElementById('cidadesInputContainer').appendChild(inp); 
        }

        function switchTab(id) { 
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active'); 
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
    </script>
</body>
</html>
