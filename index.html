<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Visitas Técnicas - Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #f8fafc; --primary: #1a1c2c; --accent: #3b82f6;
            --border-std: #94a3b8; --white: #ffffff; --holiday: #059669; --weekend: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: #1e293b; line-height: 1.5; }

        /* Navegação e Responsividade Principal */
        .top-nav { background: var(--white); border-bottom: 1px solid #e2e8f0; padding: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .nav-buttons { display: flex; gap: 5px; }
        .nav-btn { padding: 0.6rem 1rem; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; background: transparent; color: #64748b; border: 1px solid transparent; transition: 0.2s; white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: white; }

        /* Ajuste da Barra de Ações para Mobile (Admin Buttons) */
        .action-bar { 
            padding: 10px 20px; 
            background: white; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 10px; 
        }

        .action-group { display: flex; gap: 5px; flex-wrap: wrap; }

        .main-content { padding: 15px; max-width: 1600px; margin: 0 auto; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        
        @media (max-width: 768px) {
            .calendar-grid { gap: 4px; }
            .calendar-cell { height: 110px !important; padding: 4px !important; border-radius: 8px !important; }
            .day-number { font-size: 0.9rem !important; }
            .t-name { font-size: 0.55rem !important; }
            .u-name, .c-name { font-size: 0.5rem !important; }
            .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; width: 100%; }
            .action-bar { justify-content: center; padding: 10px; }
            .action-group { justify-content: center; width: 100%; }
            .top-nav h1 { width: 100%; text-align: center; margin-bottom: 5px; }
        }

        .calendar-cell {
            background: var(--white); border: 2px solid var(--border-std); border-radius: 12px;
            height: 150px; padding: 10px; display: flex; flex-direction: column; align-items: center;
            overflow: hidden; cursor: pointer; position: relative;
        }
        .cell-weekend { border-color: var(--weekend); }
        .cell-holiday { border-color: var(--holiday); }
        .day-number { font-weight: 800; font-size: 1.2rem; color: #4338ca; }
        .holiday-label { color: var(--holiday); font-size: 0.6rem; font-weight: 800; text-align: center; text-transform: uppercase; }

        .info-card { border-top: 1px solid #f1f5f9; width: 100%; padding: 4px 0; margin-top: 2px; text-align: center; }
        .t-name { font-size: 0.7rem; font-weight: 800; color: #1e293b; display: block; text-transform: uppercase; }
        .u-name { font-size: 0.65rem; font-weight: 700; color: var(--accent); display: block; }
        .c-name { font-size: 0.65rem; color: #64748b; display: block; }

        .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        .form-input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; }

        @media print {
            .no-print { display: none !important; }
            .calendar-grid { grid-template-columns: repeat(7, 1fr) !important; display: grid !important; height: 85vh; }
            .calendar-cell { border-width: 1.5px; height: auto !important; flex: 1; border-color: #000 !important; }
        }
    </style>
</head>
<body>

    <nav class="top-nav no-print">
        <h1 style="font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px;">VISITAS TÉCNICAS</h1>
        <div class="nav-buttons">
            <button class="nav-btn active" id="btn-calendario" onclick="switchTab('calendario')">Calendário</button>
            <button class="nav-btn admin-only" id="btn-agendamentos" style="display:none;" onclick="switchTab('agendamentos')">Agendar</button>
            <button class="nav-btn" id="btn-tecnicos" onclick="switchTab('tecnicos')">Técnicos</button>
            <button class="nav-btn" id="btn-urs" onclick="switchTab('urs')">URs</button>
        </div>
    </nav>

    <div class="action-bar no-print">
        <div class="action-group">
            <button class="nav-btn" style="border:1px solid #ddd" onclick="prevMonth()">Anterior</button>
            <button class="nav-btn" style="border:1px solid #ddd" onclick="nextMonth()">Próximo</button>
        </div>
        <div class="action-group">
            <button class="nav-btn admin-only" style="background:#6366f1; color:white; display:none;" id="btnPrint" onclick="window.print()">🖨️ Imprimir</button>
            <button class="nav-btn admin-only" style="background: #10b981; color: white; display:none;" id="btnPass" onclick="changePasswordModal()">🔑 Senhas</button>
            <button class="nav-btn admin-only" style="border:1px solid #ddd; display:none;" id="btnBackup" onclick="exportJSON()">💾 Backup</button>
        </div>
    </div>

    <main class="main-content">
        <div id="calendario" class="content-section active">
            <h2 id="calendarTitle" style="text-align:center; margin-bottom:15px; text-transform:uppercase; font-weight: 800; color: var(--primary);"></h2>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div id="agendamentos" class="content-section">
            <div class="card admin-only" style="display:none;">
                <h3>Novo Agendamento</h3><br>
                <form onsubmit="addAgendamento(event)">
                    <select id="tecnicoSelect" class="form-input" required></select>
                    <select id="urSelect" class="form-input" required onchange="updateCidades()"></select>
                    <select id="cidadeSelect" class="form-input" required></select>
                    <input type="date" id="dataInput" class="form-input" required>
                    <textarea id="atividadesInput" class="form-input" style="height:100px" placeholder="Roteiro Técnico" required></textarea>
                    <button type="submit" class="nav-btn" style="background:var(--accent); color:white; width:100%; padding: 12px;">Salvar no Banco Online</button>
                </form>
            </div>
        </div>

        <div id="tecnicos" class="content-section">
            <div class="card admin-only" style="display:none;">
                <h3>Cadastrar Técnico</h3><br>
                <form onsubmit="addTecnico(event)" style="display:flex; gap:10px">
                    <input type="text" id="tecnicoNomeInput" class="form-input" placeholder="Nome" required>
                    <button type="submit" class="nav-btn" style="background:var(--primary); color:white">Adicionar</button>
                </form>
            </div>
            <div class="card"><table style="width:100%" id="tecnicosTable"></table></div>
        </div>

        <div id="urs" class="content-section">
            <div class="card admin-only" style="display:none;">
                <h3>Unidades Regionais (URs)</h3><br>
                <form onsubmit="addUR(event)">
                    <input type="text" id="urNomeInput" class="form-input" placeholder="Nome UR" required>
                    <div id="cidadesInputContainer" style="margin-bottom: 10px;">
                        <input type="text" class="form-input cidade-input" placeholder="Cidade">
                    </div>
                    <button type="button" class="nav-btn" style="border:1px solid #ddd; width: 100%;" onclick="addCidadeInput()">+ Adicionar Cidade</button>
                    <button type="submit" class="nav-btn" style="background:var(--primary); color:white; width:100%; margin-top:10px;">Salvar UR</button>
                </form>
            </div>
            <div id="ursTable"></div>
        </div>
    </main>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 id="modalTitle" style="margin-bottom:15px; font-weight: 800;">Detalhes</h2>
            <div id="modalBody"></div><br>
            <button class="nav-btn" style="width:100%; background:#f1f5f9; color: var(--primary);" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQK1QbzDjQL_CwG3S7d1ClVykNcekmVn8",
            authDomain: "escala-vistas.firebaseapp.com",
            databaseURL: "https://escala-vistas-default-rtdb.firebaseio.com/",
            projectId: "escala-vistas",
            storageBucket: "escala-vistas.firebasestorage.app",
            messagingSenderId: "660320279802",
            appId: "1:660320279802:web:7160ef09c273770fd6bd4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localData = { technicians: [], urs: [], agendamentos: [] };
        const FERIADOS = { '01-01': 'Ano Novo', '19-03': 'São José', '25-03': 'Data Magna CE', '13-04': 'Aniv. Fortaleza', '01-05': 'Trabalho', '25-12': 'Natal' };
        let user = null;
        let currentDate = new Date();

        function login() {
            db.ref('config/users').once('value', (snap) => {
                const usersFromDb = snap.val() || {};
                const users = { "admin": "123", "tecnico": "456", ...usersFromDb };
                
                const u = prompt("Usuário:"); const s = prompt("Senha:");
                if (users[u] && users[u] === s) {
                    user = { id: u, nivel: (u === 'admin' ? 'total' : 'leitura') };
                    if (user.nivel === "total") {
                        document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
                        document.getElementById('btnPrint').style.display = 'block';
                        document.getElementById('btnPass').style.display = 'block';
                        document.getElementById('btnBackup').style.display = 'block';
                    } else {
                        document.getElementById('btnBackup').style.display = 'none';
                        document.getElementById('btnPrint').style.display = 'none';
                        document.getElementById('btnPass').style.display = 'none';
                    }
                    startSync();
                } else { alert("Acesso negado"); location.reload(); }
            });
        }

        function startSync() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                localData.technicians = Object.values(data.technicians || {});
                localData.urs = Object.values(data.urs || {});
                localData.agendamentos = Object.values(data.agendamentos || {});
                renderCalendar();
                updateSelects();
                renderTecnicosTable();
                renderURsTable();
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
            document.getElementById('calendarTitle').textContent = currentDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
            grid.innerHTML = '';
            ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'].forEach(d => grid.innerHTML += `<div style="text-align:center; font-size:0.7rem; font-weight:800; color:#64748b; padding-bottom:5px;">${d}</div>`);
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="calendar-cell" style="visibility: hidden;"></div>';
            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(year, month, day), dm = `${String(day).padStart(2,'0')}-${String(month+1).padStart(2,'0')}`, ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const fn = FERIADOS[dm], iw = d.getDay() === 0 || d.getDay() === 6, da = localData.agendamentos.filter(a => a.data === ds);
                let cl = "calendar-cell" + (iw ? " cell-weekend" : "") + (fn ? " cell-holiday" : "");
                let h = `<div class="${cl}" onclick="quickSchedule('${ds}')"><span class="day-number">${day}</span>${fn ? `<div class="holiday-label">${fn}</div>` : ''}`;
                da.forEach(a => {
                    const t = localData.technicians.find(x => x.id === a.tecnicoId), u = localData.urs.find(x => x.id === a.urId), c = u?.cidades.find(x => x.id === a.cidadeId);
                    h += `<div class="info-card" onclick="event.stopPropagation(); openDetail('${a.id}')"><span class="t-name">${t?.nome || '---'}</span><span class="u-name">${u?.nome || '---'}</span><span class="c-name">${c?.nome || '---'}</span></div>`;
                });
                grid.innerHTML += h + `</div>`;
            }
        }

        function changePasswordModal() {
            if (user.nivel !== 'total') return;
            const alvo = prompt("Alterar senha de qual usuário? (admin ou tecnico)");
            if (alvo === 'admin' || alvo === 'tecnico') {
                const nova = prompt("Nova senha para " + alvo + ":");
                if(nova) db.ref('config/users/' + alvo).set(nova).then(() => alert("Senha alterada!"));
            }
        }

        function renderTecnicosTable() {
            document.getElementById('tecnicosTable').innerHTML = localData.technicians.map(t => `
                <tr style="border-bottom:1px solid #eee"><td style="padding:12px; font-weight:600">${t.nome}</td>
                <td align="right">${user.nivel === 'total' ? `<button class="nav-btn" style="color:red" onclick="deleteItem('technicians','${t.id}')">Excluir</button>` : ''}</td></tr>`).join('');
        }

        function renderURsTable() {
            document.getElementById('ursTable').innerHTML = localData.urs.map(u => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center">
                <div><strong>${u.nome}</strong><br><small>${u.cidades.map(c => c.nome).join(', ')}</small></div>
                ${user.nivel === 'total' ? `<button class="nav-btn" style="color:red" onclick="deleteItem('urs','${u.id}')">Excluir</button>` : ''}</div>`).join('');
        }

        function deleteItem(path, id) { if(user.nivel === 'total' && confirm('Excluir?')) db.ref(path + '/' + id).remove(); }
        function addTecnico(e) { e.preventDefault(); if(user.nivel === 'total') { const id = Date.now().toString(); db.ref('technicians/' + id).set({ id, nome: document.getElementById('tecnicoNomeInput').value }); document.getElementById('tecnicoNomeInput').value = ''; } }
        function addUR(e) { e.preventDefault(); if(user.nivel === 'total') { const id = Date.now().toString(); const cidades = Array.from(document.querySelectorAll('.cidade-input')).map(i => ({ id: Math.random().toString(36).substr(2,9), nome: i.value })); db.ref('urs/' + id).set({ id, nome: document.getElementById('urNomeInput').value, cidades }); document.getElementById('urNomeInput').value = ''; } }
        function addAgendamento(e) { e.preventDefault(); if(user.nivel === 'total') { const id = Date.now().toString(); db.ref('agendamentos/' + id).set({ id, tecnicoId: document.getElementById('tecnicoSelect').value, urId: document.getElementById('urSelect').value, cidadeId: document.getElementById('cidadeSelect').value, data: document.getElementById('dataInput').value, atividades: document.getElementById('atividadesInput').value }); switchTab('calendario'); } }
        function quickSchedule(d) { if(user.nivel === 'total') { switchTab('agendamentos'); document.getElementById('dataInput').value = d; } }
        function openDetail(id) {
            const a = localData.agendamentos.find(x => x.id === id), t = localData.technicians.find(x => x.id === a.tecnicoId), u = localData.urs.find(x => x.id === a.urId), c = u?.cidades.find(x => x.id === a.cidadeId);
            document.getElementById('modalTitle').innerText = "Detalhes da Visita";
            document.getElementById('modalBody').innerHTML = `<p><strong>Técnico:</strong> ${t?.nome}</p><p><strong>Local:</strong> ${u?.nome} - ${c?.nome}</p><p><strong>Data:</strong> ${a.data}</p><br><div style="background:#f1f5f9; padding:15px; border-radius:8px; font-size:13px; white-space:pre-wrap;">${a.atividades}</div>`;
            if(user.nivel === 'total') document.getElementById('modalBody').innerHTML += `<br><button class="nav-btn" style="color:red; border:1px solid red; width:100%; margin-top:10px" onclick="db.ref('agendamentos/${id}').remove(); closeModal();">Excluir Registro</button>`;
            document.getElementById('modalOverlay').classList.add('active');
        }
        function addCidadeInput() { const inp = document.createElement('input'); inp.className = 'form-input cidade-input'; inp.placeholder = 'Cidade'; document.getElementById('cidadesInputContainer').appendChild(inp); }
        function switchTab(id) { document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
        function updateSelects() { document.getElementById('tecnicoSelect').innerHTML = localData.technicians.map(t => `<option value="${t.id}">${t.nome}</option>`).join(''); document.getElementById('urSelect').innerHTML = localData.urs.map(u => `<option value="${u.id}">${u.nome}</option>`).join(''); updateCidades(); }
        function updateCidades() { const ur = localData.urs.find(u => u.id === document.getElementById('urSelect').value); document.getElementById('cidadeSelect').innerHTML = ur ? ur.cidades.map(c => `<option value="${c.id}">${c.nome}</option>`).join('') : ''; }
        function exportJSON() { const d = { techs: localData.technicians, urs: localData.urs, ags: localData.agendamentos }, b = new Blob([JSON.stringify(d)], {type:'application/json'}), a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'escala_backup.json'; a.click(); }
        window.onload = login;
    </script>
</body>
</html>
